name: aura_ai
description: AuraAI - Multi-Model AI Chat SaaS Platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Firebase
  firebase_core: ^3.8.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  firebase_storage: ^12.4.1
  
  # State Management
  provider: ^6.1.1
  
  # UI & Design
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  
  # Chat & AI
  http: ^1.2.0
  
  # Document & Media
  file_picker: ^8.1.6
  image_picker: ^1.0.7
  share_plus: ^7.2.1
  screenshot: ^2.1.0
  path_provider: ^2.1.2
  
  # Utilities
  uuid: ^4.2.2
  intl: ^0.19.0
  url_launcher: ^6.2.4
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  flutter_markdown: ^0.6.18+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
